name: entegra continua
on: [pull_resquest,push]
 
jobs:
    entrega-Ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Using dotnet
            uses: actions/setup/dotnet@v5
            with:
                dotnet-version: 10.
            - name: run build e test
            run: | 
                dotnet build
                dotnet run
                dotnet test

